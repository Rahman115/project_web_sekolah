    <script>
        // 1. string Text
        let nama = "Si Fulan";

        // 3. Boolean - True/False
        let isActive = true;
        // Tampilkan hasil
        console.log(typeof isActive);

        // OPERATOR ARITMATIKA
        let a = 10, b = 3;

        console.log(a + b); // Penjumlahan
        console.log(a - b); // Pengurangan
        console.log(a * b); // Perkalian
        console.log(a / b); // Pembagian
        console.log(a % b); // Modulus - Sisa bagi
        console.log(a ** b); // pangkat - 10^3

        // increment dan decrement
        let x = 5;
        x++; // x = x + 1 (post increment)
        ++x; // pre increment
        x--; // x = x - 1
        --x; // pre decrement
        console.log(++x);

        // perbedan post dan pre
        let i = 7;
        let j = i++;
        console.log(j);
        console.log(i);

        let k = ++i;
        console.log(k);
        console.log(i);
